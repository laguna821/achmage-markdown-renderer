name: release-achmage-reader-v6-beta

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional existing tag to publish under, for example v6.0.0-beta.2"
        required: false
        type: string
  push:
    branches:
      - "v6"
    tags:
      - "v6.*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: achmage-reader-universal-v5/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./achmage-reader-universal-v5/src-tauri -> target"

      - name: Install frontend dependencies
        working-directory: achmage-reader-universal-v5
        run: npm ci

      - name: Run frontend tests
        working-directory: achmage-reader-universal-v5
        run: npm test

      - name: Build Windows release assets
        working-directory: achmage-reader-universal-v5
        run: npm run package:windows

      - name: Stage Windows release assets
        working-directory: achmage-reader-universal-v5
        run: npm run stage:release-assets -- --platform windows

      - name: Verify Windows release assets
        working-directory: achmage-reader-universal-v5
        run: npm run verify:release-assets -- --platform windows

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v6
        with:
          name: release-assets-windows
          path: achmage-reader-universal-v5/release-assets/*
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: achmage-reader-universal-v5/package-lock.json

      - name: Install Rust stable with universal targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./achmage-reader-universal-v5/src-tauri -> target"

      - name: Install frontend dependencies
        working-directory: achmage-reader-universal-v5
        run: npm ci

      - name: Run frontend tests
        working-directory: achmage-reader-universal-v5
        run: npm test

      - name: Build macOS universal release assets
        working-directory: achmage-reader-universal-v5
        run: npm run package:macos

      - name: Stage macOS release assets
        working-directory: achmage-reader-universal-v5
        run: npm run stage:release-assets -- --platform macos

      - name: Verify macOS release assets
        working-directory: achmage-reader-universal-v5
        run: npm run verify:release-assets -- --platform macos

      - name: Upload macOS release assets
        uses: actions/upload-artifact@v6
        with:
          name: release-assets-macos
          path: achmage-reader-universal-v5/release-assets/*
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_tag != ''
    needs:
      - build-windows
      - build-macos
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: achmage-reader-universal-v5/package-lock.json

      - name: Download Windows assets
        uses: actions/download-artifact@v8
        with:
          name: release-assets-windows
          path: achmage-reader-universal-v5/release-assets

      - name: Download macOS assets
        uses: actions/download-artifact@v8
        with:
          name: release-assets-macos
          path: achmage-reader-universal-v5/release-assets

      - name: Generate release checksums
        working-directory: achmage-reader-universal-v5
        run: node scripts/write-release-manifest.mjs release-assets

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          release_tag="${{ github.event.inputs.release_tag }}"
          if [ -z "$release_tag" ] && [[ "$GITHUB_REF" == refs/tags/* ]]; then
            release_tag="$GITHUB_REF_NAME"
          fi

          if [ -z "$release_tag" ]; then
            echo "No release tag provided and workflow was not triggered from a tag ref." >&2
            exit 1
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_title=Achmage Markdown Renderer $release_tag" >> "$GITHUB_OUTPUT"

      - name: Publish public prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t release_files < <(find achmage-reader-universal-v5/release-assets -type f | sort)
          if [ "${#release_files[@]}" -eq 0 ]; then
            echo "No release files found under achmage-reader-universal-v5/release-assets" >&2
            exit 1
          fi

          release_tag="${{ steps.release_meta.outputs.release_tag }}"
          release_title="${{ steps.release_meta.outputs.release_title }}"

          if gh release view "$release_tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release delete "$release_tag" --yes --repo "$GITHUB_REPOSITORY"
          fi

          printf 'Publishing release assets:\n%s\n' "${release_files[@]}"
          gh release create "$release_tag" "${release_files[@]}" --title "$release_title" --notes-file achmage-reader-universal-v5/release-notes-beta.md --prerelease --verify-tag --repo "$GITHUB_REPOSITORY"
